<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ready Homes — Premium architecture, custom modern design, and luxury features crafted for the spaces you love." />
    <!-- Preload Hero Posters for LCP -->
    <link rel="preload" as="image" href="/frames/hero-poster.webp" media="(min-width: 768px)" fetchpriority="high" />
    <link rel="preload" as="image" href="/frames/hero-poster-mobile.webp" media="(max-width: 767px)" fetchpriority="high" />
    <!-- Preload Logo for instant Preloader Paint -->
    <link rel="preload" as="image" href="/logo-white.png" fetchpriority="high" />

    <!-- Preload Headline Fonts -->
    <link rel="preload" href="/fonts/inter-tight-latin-600-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-tight-latin-700-normal.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Open Graph / Meta -->
    <meta property="og:title" content="1159 Diamond St — Ready Homes" />
    <meta property="og:description" content="Ready Homes — Premium architecture, custom modern design, and luxury features crafted for the spaces you love." />
    <!-- Update og:image host when moving to the final production domain -->
    <meta property="og:image" content="https://ready-homes-psi.vercel.app/frames/hero-poster.webp" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>1159 Diamond St — Ready Homes</title>
  </head>
  <body>
    <div id="root">
      <!-- Static Preloader Screen (fades out instantly when React mounts) -->
      <div id="static-preloader" style="position: fixed; inset: 0; z-index: 100; background-color: #141316; display: flex; flex-direction: column; justify-content: space-between; padding: 4rem 1.5rem; align-items: center; pointer-events: none; font-family: 'Inter Tight', sans-serif; box-sizing: border-box;">
        <div style="height: 5rem;"></div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">
          <img src="/logo-white.png" alt="Ready Homes" style="width: 60vw; max-w: 360px; height: auto; object-fit: contain;" />
          <div style="width: 2.5rem; height: 2.5rem; border: 2px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: static-spin 1s linear infinite; box-sizing: border-box;"></div>
        </div>
        <div style="font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: #737373; text-transform: uppercase;">
          © 2026 READY HOMES. ALL RIGHTS RESERVED.
        </div>
      </div>
      <style>
        @keyframes static-spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
